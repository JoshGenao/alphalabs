x-atp-env: &atp-env
  ATP_ENV: ${ATP_ENV:-development}
  ATP_IB_HOST: ${ATP_IB_HOST:-127.0.0.1}
  ATP_IB_LIVE_PORT: ${ATP_IB_LIVE_PORT:-4001}
  ATP_IB_PAPER_PORT: ${ATP_IB_PAPER_PORT:-4002}
  ATP_IB_ACCOUNT: ${ATP_IB_ACCOUNT:-placeholder-set-in-environment}
  ATP_MARKET_DATA_LINE_LIMIT: ${ATP_MARKET_DATA_LINE_LIMIT:-100}
  # SRS-SEC-001 encrypted credential vault (opt-in; empty in dev). In
  # staging/production, seal secrets in the vault and point these at the
  # read-only in-container paths (see the x-atp-secrets mount below).
  ATP_VAULT_FILE: ${ATP_VAULT_FILE:-}
  ATP_VAULT_KEY_FILE: ${ATP_VAULT_KEY_FILE:-}
  ATP_SSD_DATA_DIR: ${ATP_SSD_DATA_DIR:-/var/lib/atp/ssd}
  ATP_NAS_DATA_DIR: ${ATP_NAS_DATA_DIR:-/var/lib/atp/nas}
  ATP_SMTP_API_KEY: ${ATP_SMTP_API_KEY:-placeholder-set-in-environment}
  ATP_SMS_API_KEY: ${ATP_SMS_API_KEY:-placeholder-set-in-environment}
  DATABENTO_API_KEY: ${DATABENTO_API_KEY:-placeholder-set-in-environment}
  SHARADAR_API_KEY: ${SHARADAR_API_KEY:-placeholder-set-in-environment}
  ATP_LIVE_STRATEGY_MEM_MB: ${ATP_LIVE_STRATEGY_MEM_MB:-512}
  ATP_LIVE_STRATEGY_CPU: ${ATP_LIVE_STRATEGY_CPU:-0.25}
  ATP_PAPER_STRATEGY_MEM_MB: ${ATP_PAPER_STRATEGY_MEM_MB:-300}
  ATP_PAPER_STRATEGY_CPU: ${ATP_PAPER_STRATEGY_CPU:-0.10}
  ATP_HOST_MEMORY_SAFETY_MARGIN_MB: ${ATP_HOST_MEMORY_SAFETY_MARGIN_MB:-2048}

x-atp-volumes: &atp-volumes
  - atp_ssd:/ssd
  - atp_nas:/nas
  # SRS-SEC-001: the encrypted credential vault + key material, mounted
  # READ-ONLY from a host secrets directory into a stable in-container path.
  # ATP_VAULT_FILE / ATP_VAULT_KEY_FILE point at /run/atp-secrets/*. This
  # anchor is NOT applied to phase1-jupyter (own read-only data-only mounts),
  # so Jupyter cannot open the vault (SRS-SEC-004 credential isolation).
  - ${ATP_SECRETS_DIR:-./secrets}:/run/atp-secrets:ro

# SRS-SEC-001 / SRS-SEC-004 least-privilege: services that must NOT hold
# brokerage/notification credentials merge this OVER *atp-env to blank every
# catalogued secret + the vault key material, so even a plaintext .env cannot
# leak credentials into an isolated container (jupyter / IB Gateway / strategy
# runtime). Listed first in the `<<` sequence so these blanks win.
x-atp-no-secrets: &atp-no-secrets
  ATP_IB_ACCOUNT: ""
  ATP_SMTP_API_KEY: ""
  ATP_SMS_API_KEY: ""
  DATABENTO_API_KEY: ""
  SHARADAR_API_KEY: ""
  ATP_VAULT_FILE: ""
  ATP_VAULT_KEY_FILE: ""
  ATP_VAULT_PASSPHRASE: ""

services:
  # --- Architecture-check profile (SRS-ARCH-001 language boundary) ---
  orchestrator:
    profiles: ["architecture-check"]
    build:
      context: .
      dockerfile: docker/core-runtime.Dockerfile
      args:
        ATP_CRATE: atp-orchestrator

  execution-engine:
    profiles: ["architecture-check"]
    build:
      context: .
      dockerfile: docker/core-runtime.Dockerfile
      args:
        ATP_CRATE: atp-execution

  strategy-engine:
    profiles: ["architecture-check"]
    build:
      context: .
      dockerfile: docker/core-runtime.Dockerfile
      args:
        ATP_CRATE: atp-strategy-engine

  simulation-engine:
    profiles: ["architecture-check"]
    build:
      context: .
      dockerfile: docker/core-runtime.Dockerfile
      args:
        ATP_CRATE: atp-simulation

  market-data:
    profiles: ["architecture-check"]
    build:
      context: .
      dockerfile: docker/core-runtime.Dockerfile
      args:
        ATP_CRATE: atp-market-data

  data-layer:
    profiles: ["architecture-check"]
    build:
      context: .
      dockerfile: docker/core-runtime.Dockerfile
      args:
        ATP_CRATE: atp-data

  factor-pipeline:
    profiles: ["architecture-check"]
    build:
      context: .
      dockerfile: docker/core-runtime.Dockerfile
      args:
        ATP_CRATE: atp-factor-pipeline

  notification-dispatcher:
    profiles: ["architecture-check"]
    build:
      context: .
      dockerfile: docker/core-runtime.Dockerfile
      args:
        ATP_CRATE: atp-notification

  strategy-api:
    profiles: ["architecture-check"]
    build:
      context: .
      dockerfile: docker/strategy-python.Dockerfile

  # --- Phase 1 deployment stack (SRS-ARCH-004) ---
  # Brought up with: docker compose --env-file .env --profile phase1 up
  # Target: Proxmox-hosted Ubuntu VM (SyRS AC-13). Cloud VPS deployment
  # is a future target outside the release baseline; see
  # docs/DEPLOYMENT.md for portability constraints.

  phase1-orchestrator:
    profiles: ["phase1"]
    build:
      context: .
      dockerfile: docker/core-runtime.Dockerfile
      args:
        ATP_CRATE: atp-orchestrator
    env_file:
      - path: .env
        required: false
    environment: *atp-env
    volumes: *atp-volumes
    # SRS-ORCH-001: orchestrator is the sole component that manages
    # strategy container lifecycle.

  phase1-execution-engine:
    profiles: ["phase1"]
    build:
      context: .
      dockerfile: docker/core-runtime.Dockerfile
      args:
        ATP_CRATE: atp-execution
    env_file:
      - path: .env
        required: false
    environment: *atp-env
    volumes: *atp-volumes

  phase1-strategy-engine:
    profiles: ["phase1"]
    build:
      context: .
      dockerfile: docker/core-runtime.Dockerfile
      args:
        ATP_CRATE: atp-strategy-engine
    env_file:
      - path: .env
        required: false
    environment: *atp-env
    volumes: *atp-volumes

  phase1-simulation-engine:
    profiles: ["phase1"]
    build:
      context: .
      dockerfile: docker/core-runtime.Dockerfile
      args:
        ATP_CRATE: atp-simulation
    env_file:
      - path: .env
        required: false
    environment: *atp-env
    volumes: *atp-volumes

  phase1-market-data:
    profiles: ["phase1"]
    build:
      context: .
      dockerfile: docker/core-runtime.Dockerfile
      args:
        ATP_CRATE: atp-market-data
    env_file:
      - path: .env
        required: false
    environment: *atp-env
    volumes: *atp-volumes

  phase1-data-layer:
    profiles: ["phase1"]
    build:
      context: .
      dockerfile: docker/core-runtime.Dockerfile
      args:
        ATP_CRATE: atp-data
    env_file:
      - path: .env
        required: false
    environment: *atp-env
    volumes: *atp-volumes
    # SRS-DATA-008/009: SSD primary tier under /ssd, NAS archive under /nas.

  phase1-factor-pipeline:
    profiles: ["phase1"]
    build:
      context: .
      dockerfile: docker/core-runtime.Dockerfile
      args:
        ATP_CRATE: atp-factor-pipeline
    env_file:
      - path: .env
        required: false
    environment: *atp-env
    volumes: *atp-volumes

  phase1-notification-dispatcher:
    profiles: ["phase1"]
    build:
      context: .
      dockerfile: docker/core-runtime.Dockerfile
      args:
        ATP_CRATE: atp-notification
    env_file:
      - path: .env
        required: false
    environment: *atp-env
    # SRS-SEC-001: SMTP/SMS credential consumer — needs the read-only vault mount.
    volumes: *atp-volumes

  phase1-dashboard-api:
    profiles: ["phase1"]
    build:
      context: .
      dockerfile: docker/dashboard-api.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      <<: *atp-env
      ATP_DASHBOARD_BIND_HOST: 127.0.0.1
    # SRS-SEC-002: dashboard/API binds only to loopback by default.
    ports:
      - "127.0.0.1:8080:8080"
    volumes: *atp-volumes

  phase1-jupyter:
    profiles: ["phase1"]
    build:
      context: .
      dockerfile: docker/jupyter.Dockerfile
    env_file:
      - path: .env
        required: false
    # SRS-SEC-004: no brokerage/notification credentials — blanked via *atp-no-secrets.
    environment:
      <<: [*atp-no-secrets, *atp-env]
    # SRS-RES-001 + SRS-SEC-004: Jupyter has read-only access to data
    # mounts and is reachable through the dashboard, not directly.
    volumes:
      - atp_ssd:/ssd:ro
      - atp_nas:/nas:ro
    # SRS-SEC-004 (NFR-S6): NO direct access to the execution engine / IB Gateway
    # and NO ability to submit live orders. Jupyter is confined to the dedicated
    # `atp_research_net` network declared below with `internal: true`, so Docker
    # attaches no gateway — it has NO route to the host, the LAN, the internet, or
    # any other container. The execution engine and IB Gateway sit on the default
    # Compose bridge and are NOT on this network, so Jupyter can open no socket to
    # a brokerage / execution API. (Absence of `network_mode: host` alone is not
    # enough: a container with no explicit network joins the default bridge, which
    # both routes outbound through the host AND reaches every other default-bridge
    # container — the internal, single-member network removes both.) Jupyter reads
    # market data + backtest results from the read-only SSD/NAS mounts above
    # (filesystem, via the data layer — no network), so this isolation costs it no
    # functionality. The concrete dashboard->Jupyter proxy (IF-13 / SRS-RES-001,
    # operator-supplied JupyterLab image) is deferred; it must preserve a one-way
    # boundary — the live-control-bearing phase1-dashboard-api (SRS-API-001 kill
    # switch / live designation / Hot-Swap) must NOT be placed on this network, or
    # Jupyter would gain a path to the live-control REST. jupyter_isolation_check
    # enforces that dashboard-api, the execution engine, and the IB Gateway are
    # never on atp_research_net.
    networks:
      - atp_research_net
    ports:
      - "127.0.0.1:8888:8888"

  phase1-ib-gateway:
    profiles: ["phase1"]
    build:
      context: .
      dockerfile: docker/ib-gateway.Dockerfile
    env_file:
      - path: .env
        required: false
    # IB Gateway authenticates to IB out-of-band (its own credentials), so it
    # holds NO ATP brokerage/notification credentials and cannot open the vault:
    # all catalogued secrets + vault paths are blanked and no /run/atp-secrets
    # mount is granted (SRS-SEC-001 / SRS-SEC-004 least-privilege).
    environment:
      <<: [*atp-no-secrets, *atp-env]
    # SRS-EXE-006: headless IB Gateway. Replace this stub image with the
    # licensed IB Gateway container in production deployments.
    ports:
      - "${ATP_IB_HOST:-127.0.0.1}:${ATP_IB_LIVE_PORT:-4001}:${ATP_IB_LIVE_PORT:-4001}"
      - "${ATP_IB_HOST:-127.0.0.1}:${ATP_IB_PAPER_PORT:-4002}:${ATP_IB_PAPER_PORT:-4002}"

  phase1-strategy-runtime:
    profiles: ["phase1"]
    build:
      context: .
      dockerfile: docker/strategy-python.Dockerfile
    env_file:
      - path: .env
        required: false
    # SRS-SEC-004 least-privilege: strategy containers must not read brokerage
    # or notification credentials — all catalogued secrets + vault paths are
    # blanked and no /run/atp-secrets mount is granted, so a strategy cannot
    # read a credential or open the vault.
    environment:
      <<: [*atp-no-secrets, *atp-env]
    # SRS-SEC-003 least-privilege (NFR-S5 / CIS Docker Benchmark): strategy
    # containers run with NO privileged mode, NO host network access, and NO
    # access to other strategy containers' filesystems.
    #   - never privileged, and no new privileges can be gained at exec time;
    #   - every Linux capability dropped (nothing added back);
    #   - no host network access: never `network_mode: host`, and the strategy is
    #     confined to the dedicated `atp_strategy_net` network declared below with
    #     `internal: true`, so it has NO route to the host, the LAN, or the
    #     internet. The concrete StrategyContainerRuntime (deferred; owner
    #     SRS-ARCH-004 / SRS-ORCH-002) attaches the specific internal services a
    #     strategy may reach via the SYS-12 interface onto this network;
    #   - the shared SSD/NAS tiers are mounted READ-ONLY below, so a strategy
    #     cannot write into a tier another strategy could read.
    privileged: false
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    networks:
      - atp_strategy_net
    # SyRS SYS-11 resource profiles. The orchestrator clones this template
    # for each strategy instance. Live profile: <=512 MB / <=0.25 CPU;
    # paper profile: <=300 MB / <=0.10 CPU.
    labels:
      atp.profile.live.memory: "512M"
      atp.profile.live.cpus: "0.25"
      atp.profile.paper.memory: "300M"
      atp.profile.paper.cpus: "0.10"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "512M"
    # SRS-SEC-004: data tiers only — the credential vault (/run/atp-secrets) is
    # deliberately NOT mounted here, so a strategy container cannot open it.
    # SRS-SEC-003: mounted READ-ONLY so a strategy cannot write into the shared
    # SSD/NAS tiers a sibling strategy could then read (filesystem isolation).
    volumes:
      - atp_ssd:/ssd:ro
      - atp_nas:/nas:ro

volumes:
  atp_ssd:
    # SRS-DATA-008 SSD primary tier; bind to ATP_SSD_DATA_DIR on the host.
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${ATP_SSD_DATA_DIR:-/var/lib/atp/ssd}
  atp_nas:
    # SRS-DATA-008/009 NAS archive tier; bind to ATP_NAS_DATA_DIR on the host.
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${ATP_NAS_DATA_DIR:-/var/lib/atp/nas}

networks:
  # SRS-SEC-003 (NFR-S5): strategy containers have NO host network access. This
  # dedicated bridge is `internal: true`, so Docker attaches no gateway to it —
  # a container confined to it can reach only other containers explicitly placed
  # on the same network, never the host, the LAN, or the internet. The concrete
  # StrategyContainerRuntime (deferred; owner SRS-ARCH-004 / SRS-ORCH-002) joins
  # the specific internal services a strategy may reach via SYS-12 onto it.
  atp_strategy_net:
    driver: bridge
    internal: true
  # SRS-SEC-004 (NFR-S6): the Jupyter research environment has NO direct access to
  # the execution engine and NO ability to submit live orders. This dedicated
  # bridge is `internal: true` — Docker attaches no gateway, so a container
  # confined to it reaches only other containers explicitly placed on it, never
  # the host, the LAN, or the internet. Only `phase1-jupyter` is on it today — the
  # execution engine, the IB Gateway, and the live-control-bearing dashboard/API
  # (SRS-API-001) are NOT — so Jupyter can open no socket to a brokerage /
  # execution / live-control API. The deferred dashboard->Jupyter proxy (IF-13 /
  # SRS-RES-001) must keep that one-way boundary rather than placing
  # `phase1-dashboard-api` on this network; jupyter_isolation_check enforces those
  # peers are never on it.
  atp_research_net:
    driver: bridge
    internal: true
