# Public-PR-safe CI. Runs on every push and pull_request (including from forks).
# NO secrets are exposed here — secrets-bearing jobs live in integration.yml.
#
# Hardening checklist (see plan §Cybersecurity):
#   - Trigger is `pull_request`, NOT `pull_request_target` (no base-repo secrets).
#   - actions/checkout uses persist-credentials: false.
#   - All actions SHOULD be pinned by full SHA before going public.
#     Convert tags to SHAs with: pip install pin-github-action && pin-github-action .github/workflows/*.yml
#     Until then, tags below are placeholders — DO NOT make the repo public until pinning is done.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0 # critic_check needs origin/main to diff against

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # ratchet:actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # SRS-SDK-006 / SyRS C-9: TA-Lib C library is a mandatory native
      # dependency for the Python TA-Lib wrapper installed by requirements.txt.
      # Cache the built library so subsequent runs skip the ~2 min build.
      - name: Cache TA-Lib C library
        id: cache-talib
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # ratchet:actions/cache@v4
        with:
          path: |
            /usr/local/lib/libta-lib.*
            /usr/local/lib/libta_lib.*
            /usr/local/include/ta-lib
          key: talib-c-0.6.4-${{ runner.os }}

      - name: Install TA-Lib C library 0.6.4 (SRS-SDK-006 / SyRS C-9)
        if: steps.cache-talib.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential wget ca-certificates
          cd /tmp
          wget -q https://github.com/TA-Lib/ta-lib/releases/download/v0.6.4/ta-lib-0.6.4-src.tar.gz
          tar -xzf ta-lib-0.6.4-src.tar.gz
          cd ta-lib-0.6.4
          ./configure --prefix=/usr/local
          make
          sudo make install
          sudo ldconfig

      - name: Refresh ldconfig (TA-Lib cache restore path)
        if: steps.cache-talib.outputs.cache-hit == 'true'
        run: sudo ldconfig

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -r requirements-dev.txt

      - name: Lint — ruff check
        run: ruff check .

      - name: Lint — ruff format
        run: ruff format --check .

      - name: Typecheck — mypy
        run: mypy python/
        continue-on-error: true # remove once strict typing lands across python/

      - name: Pytest (L1 + L2 + L3 + L4 + L7 — gated layers excluded)
        env:
          ATP_RUN_INTEGRATION: "0"
          ATP_RUN_E2E: "0"
          # SRS-SDK-006: numba JIT disabled (pandas-ta path; irrelevant
          # to the SDK's pandas_ta.sma / bbands callers).
          NUMBA_DISABLE_JIT: "1"
        run: pytest -m "not integration and not e2e" --junitxml=pytest.xml

      - name: Architecture & contract checks
        run: |
          for check in architecture dependency_boundary adapter_isolation deployment config rest_api websocket_api cli adapter data_provider historical_data strategy_api strategy_api_parity strategy_api_scheduler strategy_api_subscriptions strategy_api_order_events strategy_api_warmup strategy_api_indicators; do
            echo "→ tools/${check}_check.py"
            python3 "tools/${check}_check.py"
          done

      - name: Critic — deterministic
        run: python3 tools/critic_check.py --range origin/main..HEAD --format text

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ratchet:actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest.xml
          retention-days: 14

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # ratchet:dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # ratchet:Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test
        run: cargo test --workspace
