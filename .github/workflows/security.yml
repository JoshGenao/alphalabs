# Security scanning. Runs on every PR and on a nightly schedule. No secrets.
#
# Layers:
#   - gitleaks   — secret-pattern scan (defense-in-depth with tools/critic_check.py)
#   - bandit     — Python SAST
#   - pip-audit  — Python dependency CVEs
#   - cargo audit — Rust dependency CVEs
#   - CodeQL     — Python + Rust static analysis
#
# Failures here block merge via branch protection on `main`.

name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 6 * * *" # 06:17 UTC nightly

permissions:
  contents: read
  security-events: write # required by CodeQL upload

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # ratchet:gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          # Required since gitleaks-action v2.3.7+: a token is needed to enumerate
          # PR commits. The default read-only GITHUB_TOKEN is sufficient.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python-sast:
    name: Python SAST (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # ratchet:actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
      - name: bandit
        run: bandit -r python/ tools/ -ll
      - name: pip-audit
        run: |
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip-audit -r requirements-dev.txt; fi

  rust-audit:
    name: Rust dependency audit (cargo audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # ratchet:dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python] # rust CodeQL is in beta; add when stable
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # ratchet:github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # ratchet:github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
